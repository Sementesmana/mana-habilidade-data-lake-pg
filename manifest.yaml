# Manifesto da Habilidade — Maná Builder
# Ver: ADR 2026-06-26-mana-builder-matriz-cobertura (vault)
# Ver: ADR 2026-06-30-stack-dados-mana-builder (par com se-dataset-reader)

# Identidade
nome: mana-habilidade-data-lake-pg
descricao: Cache durável JSONB no Postgres pra esconder fontes lentas atrás de uma camada de leitura rápida. Padrão lake-first com fallback ao-vivo + advisory_lock pra concorrência (Gunicorn N workers). Habilidade canônica da Maná Builder, sub-categoria emergente "dados".
categoria: habilidade

# Ownership
owner: xayer-mana
codeowners: [xayer-mana]

# Versão
versao-atual: 0.1.0
ultima-revisao: 2026-07-04

# Status do ciclo de vida
# ADR 2026-06-28-habilidade-canonica-gate-consumidor-real
status: beta   # flip 2026-07-03 (aval Xayer): gate consumidor-real cumprido pelo agente-comercio-revendas
consumidores-migrados: [agente-comercio-revendas, agente-documentos]
notas-de-migracao:
  - "2026-06-30: extração inicial. Origem prática: agente-pedidos data lake inline (ADR 2026-06-30-agente-pedidos-data-lake-banco-mana). Decisão de extrair antecipadamente (sem aguardar 2ª cópia) baseada em Xayer ('vamos usar muito'). Pendente migração do agente-pedidos pra cumprir gate beta."
  - "2026-07-03: 1º CONSUMIDOR REAL em produção — agente-comercio-revendas (piloto Dayan 2): sync lake-first de pedidos SA (chave sa_orders_<safra>, schema comercializacao, lock 720124) + botão Atualizar Data Lake. Validado em prod (snapshot 275 pedidos). Gate consumidor-real cumprido; migração do agente-pedidos (inline→habilidade) segue pendente."
  - "2026-07-04: 2º consumidor EM DEPLOY — agente-documentos Aba 2 v2 (ADR 2026-07-04-aba2-v2-deterministica-lake-sem-check-cpr): ingestão estruturada de docs (chave doc:<md5>) + histórico de análises (chave analise:<idprocess>), schema analise_documental, lock 778912. Requer DATABASE_URL no Railway; degradação graciosa sem ela."
  - "2026-07-05: 2º consumidor VALIDADO EM PROD — smoke WF 000002: 9 docs LAKE HIT em 0,4s (análise 108,9s→57,8s; contador gateway +1 em vez de +4). GOTCHA de integração descoberto: read() retorna TUPLA (dados, atualizado_em) — consumidor que tratar como dict tem miss eterno silencioso. Candidata ao gate beta→producao (2 consumidores reais); flip de status na decisão do Xayer."

# Matriz 3D (Maná Builder)
cadeia: transversal           # apoio | negocio | gestao | transversal
sub-categoria-emergente: dados   # introduzida no ADR 2026-06-30-stack-dados-mana-builder
hierarquia: []                # transversal
tipo_artefato: habilidade

# Relações
substitui-copias-em:
  - agente-pedidos             # _lake_init/_lake_get/_lake_put inline em app.py (ADR 2026-06-30)
consumidores: []
consumidores-planejados: [agente-documentos, agente-pedidos, agente-gestor-comercial, agente-tms, agente-monitor, qualquer-painel-com-fonte-lenta]
depende-de: []
habilidade-irma: se-dataset-reader   # par do stack de dados (ADR 2026-06-30-stack-dados-mana-builder)

# Dependências
deps-hard: [psycopg2-binary>=2.9.10]   # wheel Python 3.13
deps-opcionais: [apscheduler]          # apenas se consumidor usar lake.schedule_cron (não implementado v0.1.0)
binarios-sistema: []

# Schema padrão
schema-padrao: |
  CREATE SCHEMA IF NOT EXISTS {schema};
  CREATE TABLE IF NOT EXISTS {schema}.{table_name} (
    chave         TEXT PRIMARY KEY,
    dados         JSONB NOT NULL,
    atualizado_em TIMESTAMPTZ DEFAULT NOW()
  );

# Distribuição
registry: git-tag
url-pacote: ""
url-repo: https://github.com/Sementesmana/mana-habilidade-data-lake-pg
url-instalacao: "git+https://github.com/Sementesmana/mana-habilidade-data-lake-pg.git@v0.1.0"

# Integração com sistemas legados
integracoes-legados: []

# Skill no Plugin Maná
skill-publicada: false
url-skill-no-plugin: ""

# LGPD
toca-pii: false       # transporta JSONB; consumidor decide pseudonimização no momento do uso

# ADRs aplicáveis
adrs:
  - 2026-06-23-mana-data-gateway-se-governa-banco-mana-serve   # arquitetura materializada (L2 cache)
  - 2026-06-24-plataforma-agentica-mana-5-camadas
  - 2026-06-26-mana-builder-matriz-cobertura
  - 2026-06-26-fluxo-criacao-habilidade-mana-builder
  - 2026-06-26-distribuicao-via-git-tag-pacotes-mana-builder
  - 2026-06-26-plugin-mana-skills-cowork
  - 2026-06-28-habilidade-canonica-gate-consumidor-real
  - 2026-06-30-agente-pedidos-data-lake-banco-mana   # origem prática (1ª aplicação)
  - 2026-06-30-stack-dados-mana-builder              # formaliza par com se-dataset-reader

# Tags livres
tags: [data-lake, postgres, jsonb, cache, lake-first, fallback, advisory-lock, ingestao, dados, transversal, mana-builder, materializa-mana-data-gateway]
